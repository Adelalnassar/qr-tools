<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Data Receiver</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #333; border-radius: 10px; overflow: hidden; }
        .progress-container { margin: 20px auto; width: 80%; background: #333; height: 25px; border-radius: 15px; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #28a745; border-radius: 15px; transition: width 0.2s; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>QR Stream Receiver</h2>
    <div id="reader"></div>
    
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    
    <div id="status">Waiting for stream...</div>
    <div id="stats" style="font-size: 0.8em; color: #888;">0 / 0 chunks collected</div>

    <script>
        const chunks = {};
        let totalChunks = 0;
        let isComplete = false;

        function onScanSuccess(decodedText) {
            if (isComplete) return;

            // Header format: index|total|data
            const parts = decodedText.split('|');
            if (parts.length < 3) return;

            const index = parseInt(parts[0]);
            const total = parseInt(parts[1]);
            const data = parts[2];

            if (!totalChunks) totalChunks = total;

            // Store the chunk if we don't have it
            if (!chunks[index]) {
                chunks[index] = data;
                updateProgress();
            }

            // Check if we have everything
            if (Object.keys(chunks).length === totalChunks) {
                isComplete = true;
                assembleFile();
            }
        }

        function updateProgress() {
            const count = Object.keys(chunks).length;
            const percent = (count / totalChunks * 100).toFixed(1);
            document.getElementById('progress-bar').style.width = percent + "%";
            document.getElementById('status').innerText = `Receiving: ${percent}%`;
            document.getElementById('stats').innerText = `${count} / ${totalChunks} chunks collected`;
        }

        function assembleFile() {
            document.getElementById('status').innerText = "Reassembling file...";
            
            // 1. Join chunks in order
            let base64 = "";
            for (let i = 0; i < totalChunks; i++) {
                base64 += chunks[i];
            }

            // 2. Convert Base64 back to a file Blob
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], {type: "application/octet-stream"});

            // 3. Trigger Download
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "transferred_file";
            document.body.appendChild(a);
            a.click();
            
            document.getElementById('status').innerText = "Transfer Complete! Check downloads.";
        }

        // Initialize Camera
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: { width: 250, height: 250 } },
            onScanSuccess
        );
    </script>
</body>
</html>
