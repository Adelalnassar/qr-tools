<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal QR Transfer</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        .dashboard { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 560px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-send { background: #007bff; color: white; }
        .btn-receive { background: #28a745; color: white; }
        .hidden { display: none; }
        #qr-canvas { background: white; padding: 10px; border-radius: 8px; margin: 20px auto; display: block; box-sizing: content-box; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
        .progress-container { width: 100%; background: #333; height: 15px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.1s; }
        .status { font-weight: bold; margin-top: 10px; color: #aaa; min-height: 1.4em; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>QR Tools</h2>
        <div class="nav-buttons">
            <button class="btn-send" onclick="showMode('send')">Projector (Send)</button>
            <button class="btn-receive" onclick="showMode('receive')">Receiver (Catch)</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div id="mode-send" class="hidden">
            <h3>Projector Mode</h3>
            <input type="file" id="file-input" style="margin-bottom: 15px;">
            <canvas id="qr-canvas" width="440" height="440"></canvas>
            <div class="progress-container"><div id="progress-bar-send" class="progress-bar" style="width:0%;background:#007bff;"></div></div>
            <div id="status-send" class="status">Ready to beam...</div>
        </div>

        <div id="mode-receive" class="hidden">
            <h3>Receiver Mode</h3>
            <div id="reader"></div>
            <div class="progress-container"><div id="progress-bar-receive" class="progress-bar" style="width:0%;background:#28a745;"></div></div>
            <div id="status-receive" class="status">Waiting for camera...</div>
        </div>
    </div>

    <script>
        // --- Navigation ---
        function showMode(mode) {
            document.getElementById('mode-send').classList.add('hidden');
            document.getElementById('mode-receive').classList.add('hidden');
            document.getElementById('mode-' + mode).classList.remove('hidden');
            if (mode === 'receive') startScanner();
            else stopScanner();
        }

        // --- Global state ---
        let streamActive = false, sendTimer = null;
        let recvChunks = {}, recvCount = 0, totalChunks = 0, fileName = '', isComplete = false;
        const scanner = new Html5Qrcode('reader');

        // --- SENDER ---
        document.getElementById('file-input').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileName = file.name.replace(/[^a-z0-9\.]/gi, '_');
            const fr = new FileReader();
            fr.onload = function(ev) {
                const base64 = ev.target.result.split(',')[1];
                // 1500 bytes/chunk vs original 250 — 6x more data per QR frame
                const SIZE = 1500;
                const parts = [];
                for (let i = 0; i < base64.length; i += SIZE) parts.push(base64.substring(i, i + SIZE));
                startStream(parts);
            };
            fr.readAsDataURL(file);
        };

        function startStream(parts) {
            streamActive = false;
            if (sendTimer) clearTimeout(sendTimer);
            streamActive = true;
            streamFrame(parts, document.getElementById('qr-canvas'), 0);
        }

        async function streamFrame(parts, canvas, idx) {
            if (!streamActive) return;
            const total = parts.length;
            const t0 = performance.now();

            // Direct canvas render — no DOM recreation, just pixel update
            await QRCode.toCanvas(canvas, `${idx}|${total}|${fileName}|${parts[idx]}`, {
                width: 440, errorCorrectionLevel: 'L', margin: 1,
                color: { dark: '#000000', light: '#ffffff' }
            });

            const elapsed = performance.now() - t0;
            // Target 80ms per frame (vs original 180ms). Adapt if render takes longer.
            const delay = Math.max(5, 80 - elapsed);

            document.getElementById('progress-bar-send').style.width = ((idx + 1) / total * 100) + '%';
            document.getElementById('status-send').innerText =
                `Beaming: ${idx + 1} / ${total}  |  ~${Math.round(1000 / (elapsed + delay))} fps`;

            sendTimer = setTimeout(() => streamFrame(parts, canvas, (idx + 1) % total), delay);
        }

        // --- RECEIVER ---
        function startScanner() {
            isComplete = false; recvChunks = {}; recvCount = 0; totalChunks = 0;
            scanner.start(
                { facingMode: 'environment' },
                { fps: 30, qrbox: 350 },  // higher fps + larger scan zone
                onScan
            ).catch(console.error);
        }

        function onScan(text) {
            if (isComplete) return;
            // Manual index-of parse avoids split() overhead on every scan hit
            const b1 = text.indexOf('|');
            if (b1 < 0) return;
            const b2 = text.indexOf('|', b1 + 1);
            if (b2 < 0) return;
            const b3 = text.indexOf('|', b2 + 1);
            if (b3 < 0) return;

            const idx = +text.substring(0, b1);
            const tot = +text.substring(b1 + 1, b2);
            const name = text.substring(b2 + 1, b3);
            const data = text.substring(b3 + 1);

            if (!totalChunks) { totalChunks = tot; fileName = name; }
            if (recvChunks[idx] === undefined) {
                recvChunks[idx] = data;
                recvCount++;
                document.getElementById('progress-bar-receive').style.width = (recvCount / totalChunks * 100) + '%';
                document.getElementById('status-receive').innerText = `Catching: ${recvCount} / ${totalChunks}`;
                if (recvCount === totalChunks) { isComplete = true; doDownload(); }
            }
        }

        function stopScanner() { scanner.stop().catch(() => {}); }

        async function doDownload() {
            document.getElementById('status-receive').innerText = 'Reassembling...';
            const parts = [];
            for (let i = 0; i < totalChunks; i++) parts.push(recvChunks[i]);
            const blob = await (await fetch(`data:application/octet-stream;base64,${parts.join('')}`)).blob();
            const url = URL.createObjectURL(blob);
            Object.assign(document.createElement('a'), { href: url, download: fileName }).click();
            URL.revokeObjectURL(url);
            document.getElementById('status-receive').innerText = 'DONE! Saved.';
        }
    </script>
</body>
</html>
