<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo QR Receiver</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; padding: 10px; margin: 0; }
        #reader { width: 100%; max-width: 450px; margin: auto; border-radius: 15px; overflow: hidden; }
        .progress-container { margin: 20px auto; width: 90%; background: #222; height: 15px; border-radius: 10px; }
        #progress-bar { width: 0%; height: 100%; background: #007bff; border-radius: 10px; transition: width 0.1s; }
        #status { font-weight: bold; font-size: 1.1em; color: #007bff; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div id="status">Ready for Stream</div>
    <div id="stats" style="color: #666; font-size: 0.8em; margin-top: 5px;">0 / 0 chunks</div>

    <script>
        const chunks = {};
        let totalChunks = 0, receivedFileName = "", isComplete = false;

        async function onScanSuccess(decodedText) {
            if (isComplete) return;
            const parts = decodedText.split('|');
            if (parts.length < 4) return;

            const idx = parseInt(parts[0]), tot = parseInt(parts[1]), name = parts[2], data = parts[3];
            if (!totalChunks) { totalChunks = tot; receivedFileName = name; }

            if (!chunks[idx]) {
                chunks[idx] = data;
                const count = Object.keys(chunks).length;
                const percent = (count / totalChunks * 100).toFixed(1);
                document.getElementById('progress-bar').style.width = percent + "%";
                document.getElementById('status').innerText = `Catching: ${percent}%`;
                document.getElementById('stats').innerText = `${count} / ${totalChunks} pieces`;
                if (count === totalChunks) { isComplete = true; download(); }
            }
        }

        async function download() {
            document.getElementById('status').innerText = "Reassembling...";
            const blob = await (await fetch(`data:application/octet-stream;base64,${Object.keys(chunks).sort((a,b)=>a-b).map(k=>chunks[k]).join('')}`)).blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = receivedFileName; a.click();
            document.getElementById('status').innerText = "DONE! Saved.";
        }

        const scanner = new Html5Qrcode("reader");
        // INCREASED FPS TO 30 FOR SMOOTH CATCHING
        scanner.start({ facingMode: "environment" }, { fps: 30, qrbox: 280 }, onScanSuccess);
    </script>
</body>
</html>
