<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Receiver (With Filename)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 25px; background: #28a745; border-radius: 15px; transition: width 0.2s; }
        .progress-container { margin: 20px auto; width: 80%; background: #333; height: 25px; border-radius: 15px; }
    </style>
</head>
<body>
    <h2>QR Receiver</h2>
    <div id="reader"></div>
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div id="status">Point at the PC screen...</div>

    <script>
        const chunks = {};
        let totalChunks = 0;
        let receivedFileName = "downloaded_file.docx";
        let isComplete = false;

        function onScanSuccess(decodedText) {
            if (isComplete) return;
            const parts = decodedText.split('|');
            if (parts.length < 4) return; // Expecting 4 parts now

            const index = parseInt(parts[0]);
            const total = parseInt(parts[1]);
            const fileName = parts[2];
            const data = parts[3];

            if (!totalChunks) {
                totalChunks = total;
                receivedFileName = fileName;
            }

            if (!chunks[index]) {
                chunks[index] = data;
                const count = Object.keys(chunks).length;
                const percent = (count / totalChunks * 100).toFixed(1);
                document.getElementById('progress-bar').style.width = percent + "%";
                document.getElementById('status').innerText = `Receiving ${receivedFileName}: ${percent}%`;

                if (count === totalChunks) {
                    isComplete = true;
                    assembleAndSave();
                }
            }
        }

        function assembleAndSave() {
            document.getElementById('status').innerText = "Finishing...";
            let fullBase64 = "";
            for (let i = 0; i < totalChunks; i++) {
                fullBase64 += chunks[i];
            }

            const byteCharacters = atob(fullBase64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const blob = new Blob([new Uint8Array(byteNumbers)], {type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
            
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = receivedFileName; // This uses the real Word filename!
            document.body.appendChild(a);
            a.click();
            document.getElementById('status').innerText = "Done! Open your Files app.";
        }

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
    </script>
</body>
</html>
